<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/member.css">
</head>
<body>
    <header id="banner">
        <a class="close" href="Login.html">&times;</a>
    </header>

    <form action="member.php" method="post" name="member" onsubmit="return validateForm()">
        <fieldset>
            <legend>프로필 만들기</legend>
            <div class="mbox">
                <div class="mbox1">
                    <label for="u_name">이름</label>
                    <input type="text" size="45" autofocus placeholder="이름" name="user_name" id="u_name">
                </div>

                <div class="mbox1">
                    <label for="u_id">아이디</label>
                    <input type="text" size="45" placeholder="4~12자 영문과 숫자만 입력이 가능합니다." maxlength="12" name="user_id" id="u_id">
                    <button class="chk1">중복 확인</button>
                </div>

                <div class="mbox1">
                    <label for="u_password">비밀번호</label>
                    <input type="password" size="45" placeholder="8자 이상 영문과 숫자만 입력이 가능합니다." name="user_password" id="u_password">
                </div>

                <div class="mbox1">
                    <label for="u_password_chk">비밀번호 확인</label>
                    <input type="password" size="45" placeholder="암호 확인" name="user_password_chk" id="u_password_chk">
                </div>

                <div class="mbox1">
                    <label for="u_tel">전화번호</label>
                    <input type="tel" size="45" placeholder="하이픈 (-)을 넣지 말고 11자리의 전화번호를 입력해주세요." name="user_tel" maxlength="11" id="u_tel">
                    <div class="mbox2">
                        <p class="recieve1">SNS를 통한 정보 수신 동의 여부 :
                            <input type="radio" value="y" name="receive_tel" id="tel1">
                            <label for="tel1"> 예</label>
                            <input type="radio" value="n" name="receive_tel" id="tel2">
                            <label for="tel2"> 아니오</label>
                        </p>
                    </div>
                </div>

                <div class="mbox1">
                    <label for="u_email">이메일 주소</label>
                    <input type="email" size="45" placeholder="ex&#41; abc@Lenovo.com" name="user_email" id="u_email">
                    <div class="mbox2">
                        <p class="recieve1">SNS를 통한 정보 수신 동의 여부 :
                            <input type="radio" value="y" name="receive_mail" id="mail1">
                            <label for="mail1"> 예</label>
                            <input type="radio" value="n" name="receive_mail" id="mail2">
                            <label for="mail2"> 아니오</label>
                        </p>
                    </div>
                </div>
                

                <div class="mbox1">
                    <label for="u_add">주소</label>
                    <input type="text" size="45" placeholder="주소" name="user_add" id="u_add">
                </div>

                <div class="send">
                    <input type="submit" value="회원가입" class="send1">
                    <input type="reset" value="초기화" class="send1">
                </div>
            </div>
        </fieldset>
    </form>

    <script src="js/member.js"></script>
</body>
</html>
